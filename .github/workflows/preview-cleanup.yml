# ==============================================
# Preview Worker クリーンアップワークフロー
# ==============================================
# PR クローズ時に、PR ごとに作成された動的 Preview Worker を削除する。
#
# Web / API デプロイ CI が PR 時に作成する動的 Worker:
#   Web: storybook-vrt-sample-web-pr-{number}-{branch}
#   API: storybook-vrt-sample-api-pr-{number}-{branch}
#
# Worker が存在しない場合（paths-filter でデプロイがスキップされた場合等）も
# --force で安全に完了する。
#
# 必要な設定:
#   Secrets:
#     CLOUDFLARE_API_TOKEN    — Cloudflare API Token
#       権限: Workers Scripts: Edit
#
# wrangler delete は KV namespaces API へのアクセスを試みるため
# 追加権限が必要になる。Cloudflare REST API を直接叩くことで
# Workers Scripts: Edit 権限のみで削除できる。
# ==============================================
name: 🧹 Preview Worker Cleanup

on:
  pull_request:
    types: [closed]

env:
  CLOUDFLARE_ACCOUNT_ID: 95d6c4c8536abbe739beadf65c380ae4

jobs:
  cleanup:
    name: 🧹 Delete Preview Workers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compute preview worker names
        id: preview
        run: |
          BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          PR_NUM=${{ github.event.pull_request.number }}
          WEB_NAME=$(echo "storybook-vrt-sample-web-pr-${PR_NUM}-${BRANCH}" | cut -c1-54 | sed 's/-$//')
          API_NAME=$(echo "storybook-vrt-sample-api-pr-${PR_NUM}-${BRANCH}" | cut -c1-54 | sed 's/-$//')
          echo "web-name=$WEB_NAME" >> $GITHUB_OUTPUT
          echo "api-name=$API_NAME" >> $GITHUB_OUTPUT

      # Cloudflare REST API で直接削除（wrangler delete は KV 権限を要求するため使わない）
      # 404（Worker 未作成）も成功扱いにする
      - name: Delete Web preview worker
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/${{ steps.preview.outputs.web-name }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          echo "Web worker delete: HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "404" ]]

      - name: Delete API preview worker
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ env.CLOUDFLARE_ACCOUNT_ID }}/workers/scripts/${{ steps.preview.outputs.api-name }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")
          echo "API worker delete: HTTP $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "404" ]]
